<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario Bros - World 1-1</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-container">
        <!-- UI Header Overlay -->
        <div id="ui-header">
            <div class="ui-item">
                <span class="label">MARIO</span>
                <span id="score">000000</span>
            </div>
            <div class="ui-item">
                <span class="label">x <span id="coins">00</span></span>
            </div>
            <div class="ui-item">
                <span class="label">WORLD</span>
                <span>1-1</span>
            </div>
            <div class="ui-item">
                <span class="label">TIME</span>
                <span id="time">400</span>
            </div>
        </div>

        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <!-- Game Over / Overlay Screens -->
        <div id="overlay" class="hidden">
            <h1 id="overlay-title">GAME OVER</h1>
            <p id="overlay-subtitle">Press ENTER to Retry</p>
        </div>

        <!-- Level Intro Overlay -->
        <div id="level-intro" class="hidden">
            <h1>WORLD 1-1</h1>
            <div class="lives-info">
                <span>x <span id="lives-display">3</span></span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
